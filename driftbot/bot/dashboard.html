<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Paper Trading Bot</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2129; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --green: #3fb950; --red: #f85149;
    --blue: #58a6ff; --gray: #6e7681; --purple: #bc8cff; --amber: #d29922;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 20px 16px 60px; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
  }
  .title { display: flex; align-items: center; gap: 12px; }
  .title h1 { font-size: 22px; margin: 0; letter-spacing: .5px; }
  .badge {
    font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 999px;
    background: var(--panel2); border: 1px solid var(--border); color: var(--muted);
  }
  .badge.BUY { color: var(--green); border-color: var(--green); }
  .badge.SELL { color: var(--red); border-color: var(--red); }
  .price { text-align: right; }
  .price .big { font-size: 26px; font-weight: 700; }
  .price .sub { font-size: 12px; color: var(--muted); }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px; margin-bottom: 20px;
  }
  .tile {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
  }
  .tile .label { font-size: 11px; text-transform: uppercase; color: var(--muted); letter-spacing: .5px; }
  .tile .val { font-size: 20px; font-weight: 600; margin-top: 4px; }
  .pos { color: var(--green); } .neg { color: var(--red); }
  .panel {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; margin-bottom: 16px;
  }
  .panel h2 { font-size: 12px; text-transform: uppercase; color: var(--muted);
    letter-spacing: .5px; margin: 0 0 10px; }
  canvas { width: 100%; display: block; }
  /* Fixed CSS heights so the bitmap size is derived from a stable layout size
     (prevents the canvas from growing on every refresh on Retina displays). */
  #equityChart { height: 150px; }
  #priceChart { height: 260px; }
  #rsiChart { height: 120px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { text-align: right; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  th:first-child, td:first-child { text-align: left; }
  th { color: var(--muted); font-weight: 500; font-size: 11px; text-transform: uppercase; }
  td.BUY { color: var(--green); } td.SELL { color: var(--red); }
  .foot { color: var(--muted); font-size: 12px; text-align: center; margin-top: 20px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--gray); margin-right: 6px; }
  .dot.live { background: var(--green); }
  .note { color: var(--amber); font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="title">
      <h1 id="product">—</h1>
      <span class="badge" id="signal">…</span>
      <span class="badge" id="mode">PAPER</span>
    </div>
    <div class="price">
      <div class="big" id="price">—</div>
      <div class="sub"><span class="dot" id="livedot"></span><span id="updated">connecting…</span></div>
    </div>
  </header>

  <div class="grid" id="tiles"></div>

  <div class="panel">
    <h2>Equity curve — account value over time (dashed = starting balance)</h2>
    <canvas id="equityChart" height="150"></canvas>
  </div>

  <div class="panel">
    <h2>Price · EMA fast (blue) / slow (gray) · trades (▲ buy ▼ sell)</h2>
    <canvas id="priceChart" height="260"></canvas>
  </div>

  <div class="panel">
    <h2>RSI (<span id="rsiBand">—</span>)</h2>
    <canvas id="rsiChart" height="120"></canvas>
    <div class="note" id="rsiNote" style="display:none"></div>
  </div>

  <div class="panel">
    <h2>Trades</h2>
    <table>
      <thead><tr><th>Time</th><th>Side</th><th>Price</th><th>Value</th><th>Fee</th><th>Reason</th></tr></thead>
      <tbody id="trades"><tr><td colspan="6" style="text-align:center;color:var(--muted)">No trades yet.</td></tr></tbody>
    </table>
  </div>

  <div class="foot">Paper trading — simulated fills against live data. Not financial advice.</div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const fmt = (n, d = 2) => (n === null || n === undefined) ? "—" :
  Number(n).toLocaleString(undefined, { minimumFractionDigits: d, maximumFractionDigits: d });

const css = (v) => getComputedStyle(document.documentElement).getPropertyValue(v).trim();

function tile(label, val, cls = "") {
  return `<div class="tile"><div class="label">${label}</div><div class="val ${cls}">${val}</div></div>`;
}

function pnlClass(v) { return v > 0 ? "pos" : v < 0 ? "neg" : ""; }

function renderTiles(s) {
  const totalPnl = (s.equity ?? s.starting_cash) - s.starting_cash;
  const pct = s.starting_cash ? (totalPnl / s.starting_cash) * 100 : 0;
  const pos = s.position_base > 0
    ? `${fmt(s.position_base, 4)} @ ${fmt(s.entry_price)}` : "flat";
  $("tiles").innerHTML = [
    tile("Equity", "$" + fmt(s.equity)),
    tile("Total P&L", (totalPnl >= 0 ? "+" : "") + "$" + fmt(totalPnl) +
      `  (${pct >= 0 ? "+" : ""}${fmt(pct)}%)`, pnlClass(totalPnl)),
    tile("Cash", "$" + fmt(s.cash)),
    tile("Position", pos),
    tile("EMA fast", fmt(s.ema_fast)),
    tile("EMA slow", fmt(s.ema_slow)),
    tile("RSI", s.rsi === null ? "—" : fmt(s.rsi, 1)),
    tile("Realized P&L", (s.realized_pnl >= 0 ? "+" : "") + "$" + fmt(s.realized_pnl), pnlClass(s.realized_pnl)),
    tile("Fees paid", "$" + fmt(s.fees_paid ?? 0), s.fees_paid > 0 ? "neg" : ""),
    tile("Trades", s.num_trades ?? 0),
  ].join("");
}

function renderTrades(trades) {
  if (!trades || !trades.length) return;
  $("trades").innerHTML = trades.slice().reverse().map(t => {
    const when = t.time.slice(0, 19).replace("T", " ");
    return `<tr><td>${when}</td><td class="${t.side}">${t.side}</td>` +
      `<td>${fmt(t.price)}</td><td>$${fmt(t.usd)}</td><td>$${fmt(t.fee)}</td><td>${t.reason}</td></tr>`;
  }).join("");
}

// Simple responsive line-chart drawing on a canvas.
function prepCanvas(cv) {
  const dpr = window.devicePixelRatio || 1;
  // Read the CSS-laid-out size (stable), NOT the bitmap size (which we mutate).
  const w = cv.clientWidth, h = cv.clientHeight;
  cv.width = Math.round(w * dpr);
  cv.height = Math.round(h * dpr);
  const ctx = cv.getContext("2d");
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, w, h);
  return { ctx, w, h };
}

function extent(arrays) {
  let lo = Infinity, hi = -Infinity;
  for (const a of arrays) for (const v of a) {
    if (v === null || v === undefined) continue;
    if (v < lo) lo = v; if (v > hi) hi = v;
  }
  if (lo === Infinity) { lo = 0; hi = 1; }
  if (lo === hi) { lo -= 1; hi += 1; }
  return [lo, hi];
}

function drawLine(ctx, data, xOf, yOf, color, width = 1.5) {
  ctx.strokeStyle = color; ctx.lineWidth = width; ctx.beginPath();
  let started = false;
  for (let i = 0; i < data.length; i++) {
    const v = data[i];
    if (v === null || v === undefined) { started = false; continue; }
    const x = xOf(i), y = yOf(v);
    if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

function renderEquityChart(s) {
  const c = s.equity_curve; if (!c || !c.equity || c.equity.length < 2) return;
  const { ctx, w, h } = prepCanvas($("equityChart"));
  const padL = 56, padR = 8, padT = 10, padB = 16;
  const n = c.equity.length, start = s.starting_cash;
  const [lo, hi] = extent([c.equity, [start]]);
  const xOf = (i) => padL + (w - padL - padR) * (n <= 1 ? 0 : i / (n - 1));
  const yOf = (v) => padT + (h - padT - padB) * (1 - (v - lo) / (hi - lo));

  ctx.fillStyle = css("--muted"); ctx.font = "10px sans-serif";
  ctx.strokeStyle = css("--border"); ctx.lineWidth = 1;
  for (let g = 0; g <= 3; g++) {
    const val = lo + (hi - lo) * g / 3, y = yOf(val);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
    ctx.fillText("$" + fmt(val, 0), 6, y + 3);
  }
  // starting-balance reference line
  const ys = yOf(start);
  ctx.strokeStyle = css("--gray"); ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(padL, ys); ctx.lineTo(w - padR, ys); ctx.stroke();
  ctx.setLineDash([]);

  const last = c.equity[n - 1];
  drawLine(ctx, c.equity, xOf, yOf, last >= start ? css("--green") : css("--red"), 1.8);
}

function renderPriceChart(s) {
  const c = s.chart; if (!c || !c.price.length) return;
  const { ctx, w, h } = prepCanvas($("priceChart"));
  const padL = 52, padR = 8, padT = 10, padB = 18;
  const n = c.price.length;
  const [lo, hi] = extent([c.price, c.ema_fast, c.ema_slow]);
  const xOf = (i) => padL + (w - padL - padR) * (n <= 1 ? 0 : i / (n - 1));
  const yOf = (v) => padT + (h - padT - padB) * (1 - (v - lo) / (hi - lo));

  // grid + y labels
  ctx.fillStyle = css("--muted"); ctx.font = "10px sans-serif";
  ctx.strokeStyle = css("--border"); ctx.lineWidth = 1;
  for (let g = 0; g <= 4; g++) {
    const val = lo + (hi - lo) * g / 4, y = yOf(val);
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
    ctx.fillText(fmt(val), 6, y + 3);
  }
  drawLine(ctx, c.price, xOf, yOf, css("--text"), 1.6);
  drawLine(ctx, c.ema_fast, xOf, yOf, css("--blue"), 1.4);
  drawLine(ctx, c.ema_slow, xOf, yOf, css("--gray"), 1.4);

  // trade markers, mapped by timestamp onto the time axis
  const t0 = c.t[0], t1 = c.t[n - 1];
  for (const tr of (s.trades || [])) {
    const ep = Date.parse(tr.time) / 1000;
    if (ep < t0 || ep > t1 || t1 === t0) continue;
    const x = padL + (w - padL - padR) * (ep - t0) / (t1 - t0);
    const y = yOf(tr.price);
    ctx.fillStyle = tr.side === "BUY" ? css("--green") : css("--red");
    ctx.beginPath();
    if (tr.side === "BUY") { ctx.moveTo(x, y + 8); ctx.lineTo(x - 5, y + 16); ctx.lineTo(x + 5, y + 16); }
    else { ctx.moveTo(x, y - 8); ctx.lineTo(x - 5, y - 16); ctx.lineTo(x + 5, y - 16); }
    ctx.closePath(); ctx.fill();
  }
}

function renderRsiChart(s) {
  const c = s.chart; if (!c || !c.rsi || !c.rsi.length) return;
  const { ctx, w, h } = prepCanvas($("rsiChart"));
  const padL = 52, padR = 8, padT = 8, padB = 14;
  const n = c.rsi.length;
  const xOf = (i) => padL + (w - padL - padR) * (n <= 1 ? 0 : i / (n - 1));
  const yOf = (v) => padT + (h - padT - padB) * (1 - v / 100);

  ctx.fillStyle = css("--muted"); ctx.font = "10px sans-serif";
  for (const lvl of [30, 50, 70]) {
    const y = yOf(lvl);
    ctx.strokeStyle = lvl === 50 ? css("--border") : css("--gray");
    ctx.setLineDash(lvl === 50 ? [] : [3, 3]); ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(w - padR, y); ctx.stroke();
    ctx.fillText(String(lvl), 30, y + 3);
  }
  ctx.setLineDash([]);
  drawLine(ctx, c.rsi, xOf, yOf, css("--purple"), 1.6);
}

let last = null;

async function poll() {
  let s;
  try {
    const r = await fetch("/api/state", { cache: "no-store" });
    s = await r.json();
  } catch (e) {
    $("livedot").classList.remove("live");
    $("updated").textContent = "disconnected — is the bot running?";
    return;
  }
  last = s;
  try {
    $("livedot").classList.add("live");
    if (s.warming_up && !s.chart) {
      $("updated").textContent = "warming up — waiting for enough candles…";
      return;
    }
    $("product").textContent = s.product || "—";
    const sig = $("signal"); sig.textContent = s.signal || "…";
    sig.className = "badge " + (s.signal || "");
    $("price").textContent = "$" + fmt(s.price, s.price < 5 ? 4 : 2);
    $("updated").textContent = "updated " + (s.updated || "").slice(11, 19) + " UTC";
    $("rsiBand").textContent = `${fmt(s.rsi_buy_min, 0)} / ${fmt(s.rsi_buy_max, 0)}`;

    const note = $("rsiNote");
    if (s.rsi_blocked) {
      note.style.display = "block";
      note.textContent = "A BUY crossover is active but RSI is outside the band — entry skipped.";
    } else note.style.display = "none";

    renderTiles(s); renderTrades(s.trades);
    renderEquityChart(s); renderPriceChart(s); renderRsiChart(s);
  } catch (e) {
    $("updated").textContent = "render error: " + e.message;
  }
}

window.addEventListener("resize", () => {
  if (last && last.chart) {
    renderEquityChart(last); renderPriceChart(last); renderRsiChart(last);
  }
});

poll();
setInterval(poll, 5000);
</script>
</body>
</html>
