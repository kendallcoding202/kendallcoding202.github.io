<!doctype html>
<html><head><meta charset="utf8"><title>BREACH — end card</title><style>
  html,body{margin:0;padding:0;background:#03060b;height:100%;}
  *{box-sizing:border-box;font-family:"DejaVu Sans Mono","Courier New",monospace;}
  /* 16:9 stage — fills the viewport, letterboxed so a screen-cap is clean 1920×1080 */
  .stage{position:relative;width:100vw;height:56.25vw;max-height:100vh;max-width:177.78vh;margin:auto;
    top:50%;transform:translateY(-50%);overflow:hidden;
    background:
      radial-gradient(120% 140% at 78% 12%, rgba(0,255,140,.16), transparent 55%),
      radial-gradient(90% 120% at 12% 95%, rgba(0,180,255,.10), transparent 55%),
      linear-gradient(160deg,#060b0e 0%,#04070a 60%,#03060b 100%);}
  /* scanline + grid texture, matched to the capsule */
  .stage::before{content:"";position:absolute;inset:0;z-index:4;
    background-image:repeating-linear-gradient(0deg,rgba(0,255,150,.035) 0 1px,transparent 1px 3px);
    mix-blend-mode:screen;pointer-events:none;}
  .stage::after{content:"";position:absolute;inset:0;z-index:1;
    background-image:linear-gradient(rgba(0,255,150,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,150,.05) 1px,transparent 1px);
    background-size:3.2vh 3.2vh;opacity:.30;pointer-events:none;
    -webkit-mask-image:radial-gradient(120% 100% at 50% 40%,#000,transparent 78%);}

  .scene{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;}

  /* ---- Scene 1: the tagline types in ---- */
  #tagScene{opacity:1;transition:opacity .5s ease;}
  .tagline{color:#eafff2;font-size:6.2vh;letter-spacing:.15vh;font-style:italic;font-weight:bold;
    text-shadow:0 0 2.4vh rgba(0,255,140,.5),0 0 .5vh rgba(0,255,140,.85);white-space:nowrap;}
  .tagline .type{border-bottom:.4vh solid rgba(40,255,154,.9);padding-bottom:.4vh;}
  .cursor{display:inline-block;width:.62ch;background:#28ff9a;color:#28ff9a;margin-left:.1ch;
    animation:blink 1s steps(2) infinite;}
  @keyframes blink{50%{opacity:0;}}

  /* ---- Scene 2: the logo card ---- */
  #logoScene{opacity:0;transition:opacity .7s ease;}
  #logoScene .kick{color:#5ff29a;font-size:2.6vh;letter-spacing:.5vh;opacity:0;text-transform:uppercase;margin-bottom:2.2vh;}
  .logo{font-size:17vh;font-weight:bold;letter-spacing:.4vh;line-height:.92;color:#eafff2;
    text-shadow:0 0 3.2vh rgba(0,255,140,.55),0 0 .6vh rgba(0,255,140,.9);
    opacity:0;transform:scale(.94);}
  .logo b{color:#28ff9a;}
  .subtag{margin-top:2.4vh;color:#bfedd2;font-size:3.0vh;letter-spacing:.12vh;opacity:0;font-style:italic;}
  .wish{margin-top:4vh;display:flex;align-items:center;gap:1.4vh;opacity:0;}
  .wish .star{color:#ffd15b;font-size:3.4vh;}
  .wish .btn{border:1px solid rgba(95,242,154,.7);color:#daffe9;font-size:3.0vh;letter-spacing:.28vh;
    padding:1.2vh 2.6vh;border-radius:.5vh;background:rgba(0,255,140,.07);text-transform:uppercase;}
  .wish .steam{color:#7fb4d8;font-size:2.6vh;letter-spacing:.12vh;}
  .reveal-kick{animation:fadeUp .5s ease .1s forwards;}
  .reveal-logo{animation:logoIn .9s cubic-bezier(.2,.7,.2,1) forwards;}
  .reveal-sub{animation:fadeUp .6s ease .5s forwards;}
  .reveal-wish{animation:fadeUp .6s ease .9s forwards;}
  @keyframes logoIn{0%{opacity:0;transform:scale(.94);filter:blur(.6vh);}100%{opacity:1;transform:scale(1);filter:blur(0);}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(1.4vh);}to{opacity:1;transform:translateY(0);}}

  /* faint scan sweep on the logo reveal */
  .sweep{position:absolute;inset:0;z-index:3;pointer-events:none;opacity:0;
    background:linear-gradient(100deg,transparent 40%,rgba(40,255,154,.14) 50%,transparent 60%);}
  .sweep.go{animation:sweepGo 1s ease .1s;}
  @keyframes sweepGo{0%{opacity:0;transform:translateX(-40%);}30%{opacity:1;}100%{opacity:0;transform:translateX(40%);}}

  /* unobtrusive replay control — bottom-right, won't matter in a crop */
  .replay{position:fixed;right:2.2vh;bottom:2.2vh;z-index:9;color:#3f7d5c;font-size:1.9vh;
    letter-spacing:.1vh;cursor:pointer;user-select:none;opacity:.75;}
  .replay:hover{color:#7fe0a8;}
</style></head>
<body>
  <div class="stage">
    <div class="scene" id="tagScene">
      <div class="tagline"><span class="type" id="typed"></span><span class="cursor" id="cur">█</span></div>
    </div>
    <div class="scene" id="logoScene">
      <div class="kick" id="kick">// intrusion complete</div>
      <div class="logo" id="logo">BRE<b>A</b>CH</div>
      <div class="subtag" id="subtag">Silence is a signature.</div>
      <div class="wish" id="wish"><span class="star">★</span><span class="btn">Wishlist now</span><span class="steam">on Steam</span></div>
    </div>
    <div class="sweep" id="sweep"></div>
  </div>
  <div class="replay" id="replay">▸ replay (R)</div>

  <script>
    const TEXT = "Silence is a signature.";
    const typed = document.getElementById('typed');
    const cur = document.getElementById('cur');
    const tagScene = document.getElementById('tagScene');
    const logoScene = document.getElementById('logoScene');
    const sweep = document.getElementById('sweep');
    const logo = document.getElementById('logo');
    const kick = document.getElementById('kick');
    const subtag = document.getElementById('subtag');
    const wish = document.getElementById('wish');
    let timers = [];
    const at = (ms, fn) => timers.push(setTimeout(fn, ms));

    function reset(){
      timers.forEach(clearTimeout); timers = [];
      typed.textContent = ''; cur.style.opacity = '1';
      tagScene.style.opacity = '1'; logoScene.style.opacity = '0';
      sweep.className = 'sweep';
      [logo,kick,subtag,wish].forEach(el => el.className = el.className.replace(/\breveal-\w+\b/g,'').trim());
      // force reflow so re-adding animation classes restarts them
      void logo.offsetWidth;
    }

    function play(){
      reset();
      // 1) type the tagline (~55ms/char ≈ 1.3s)
      let i = 0;
      const step = () => {
        if (i <= TEXT.length){ typed.textContent = TEXT.slice(0, i); i++; at(55, step); }
      };
      at(350, step);
      // 2) hold on the finished line, cursor blinking (~1.1s)
      const holdStart = 350 + TEXT.length*55;
      // 3) fade the tagline out, sweep + logo in
      at(holdStart + 1100, () => { tagScene.style.opacity = '0'; });
      at(holdStart + 1450, () => {
        logoScene.style.opacity = '1';
        sweep.className = 'sweep go';
        logo.className = 'logo reveal-logo';
        kick.className = 'kick reveal-kick';
        subtag.className = 'subtag reveal-sub';
        wish.className = 'wish reveal-wish';
      });
    }

    document.getElementById('replay').addEventListener('click', play);
    window.addEventListener('keydown', e => { if (e.key === 'r' || e.key === 'R') play(); });
    play();
  </script>
</body></html>
