# Builds standalone Kovyr Vault binaries so clients don't need Python
# installed: kovyr-vault.exe + kovyr-vault-app.exe on Windows, and a
# kovyr-vault CLI binary + Kovyr Vault.app on macOS. Run manually from
# the Actions tab, or push a kovyr-vault-v* tag (e.g. kovyr-vault-v0.1.0)
# to cut builds.
name: Kovyr Vault build

on:
  workflow_dispatch: {}
  push:
    tags: ["kovyr-vault-v*"]

permissions:
  contents: read

concurrency:
  group: kovyr-vault-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: kovyr-vault
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and build tools
        run: pip install . pyinstaller pytest

      - name: Run test suite
        run: python -m pytest tests/ -q

      - name: Build standalone CLI exe
        run: pyinstaller --onefile --console --name kovyr-vault --icon packaging/kovyr.ico packaging/entry.py

      - name: Build client desktop app (windowed)
        run: pyinstaller --onefile --noconsole --name kovyr-vault-app --icon packaging/kovyr.ico packaging/gui_entry.py

      # A real end-to-end check of the frozen binaries: version, duplicate
      # scan, drift monitoring, and GUI construction must all work outside
      # a Python install.
      - name: Smoke test exes
        shell: pwsh
        run: |
          .\dist\kovyr-vault.exe --version
          New-Item -ItemType Directory demo | Out-Null
          Set-Content demo\a.txt "duplicate content"
          Set-Content demo\b.txt "duplicate content"
          .\dist\kovyr-vault.exe scan demo
          .\dist\kovyr-vault.exe monitor demo --state demo\state.json --html demo\monitor.html
          if (-not (Test-Path demo\monitor.html)) { exit 1 }
          $gui = Start-Process -FilePath .\dist\kovyr-vault-app.exe -ArgumentList "--selftest" -Wait -PassThru
          if ($gui.ExitCode -ne 0) { exit 1 }

      # Setup wizard: installs both exes to Program Files\Kovyr with
      # Start-menu + optional desktop shortcuts. No manual file moves.
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress | Out-Null
          $ver = python -c "import kovyr_vault; print(kovyr_vault.__version__)"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DAppVersion=$ver packaging\windows-installer.iss
          if (-not (Test-Path dist\KovyrVaultSetup.exe)) { exit 1 }

      - name: Upload exes
        uses: actions/upload-artifact@v4
        with:
          name: kovyr-vault-windows
          if-no-files-found: error
          path: |
            kovyr-vault/dist/kovyr-vault.exe
            kovyr-vault/dist/kovyr-vault-app.exe
            kovyr-vault/dist/KovyrVaultSetup.exe

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: kovyr-vault
    # Signing/notarization activates automatically once these repo secrets
    # exist (Settings → Secrets and variables → Actions); without them the
    # job still builds unsigned binaries. See kovyr-vault/README.md.
    env:
      MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and build tools
        run: pip install . pyinstaller pytest

      - name: Run test suite
        run: python -m pytest tests/ -q

      - name: Build standalone CLI binary
        run: pyinstaller --onefile --console --name kovyr-vault packaging/entry.py

      # --windowed on macOS produces a double-clickable "Kovyr Vault.app"
      # bundle for the client desktop app.
      - name: Build client desktop app (.app bundle)
        run: pyinstaller --windowed --name "Kovyr Vault" --icon packaging/kovyr.icns packaging/gui_entry.py

      - name: Import signing certificate
        if: env.MACOS_CERT_P12 != ''
        run: |
          echo "$MACOS_CERT_P12" | base64 -d > cert.p12
          security create-keychain -p ci-build build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p ci-build build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k ci-build build.keychain
          rm cert.p12
          IDENTITY=$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application/{print $2; exit}')
          if [ -z "$IDENTITY" ]; then echo "No Developer ID Application identity found in cert"; exit 1; fi
          echo "SIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

      - name: Sign binaries
        if: env.MACOS_CERT_P12 != ''
        run: |
          codesign --force --options runtime --timestamp --sign "$SIGN_IDENTITY" dist/kovyr-vault
          codesign --deep --force --options runtime --timestamp --sign "$SIGN_IDENTITY" "dist/Kovyr Vault.app"
          codesign --verify --strict "dist/Kovyr Vault.app"

      - name: Smoke test CLI binary
        run: |
          ./dist/kovyr-vault --version
          mkdir demo
          echo "duplicate content" > demo/a.txt
          echo "duplicate content" > demo/b.txt
          ./dist/kovyr-vault scan demo
          ./dist/kovyr-vault monitor demo --state demo/state.json --html demo/monitor.html
          test -f demo/monitor.html

      # GUI needs a window server; macOS runners have one, but if this
      # ever flakes headlessly it should not block the CLI artifact.
      - name: Smoke test app (GUI selftest)
        continue-on-error: true
        run: |
          "./dist/Kovyr Vault.app/Contents/MacOS/Kovyr Vault" --selftest

      # Notarize with Apple. The ticket attaches to the submission on
      # Apple's servers whenever they finish, and Gatekeeper verifies
      # online — so a slow queue must never block the artifact:
      #   Accepted in time  -> staple (offline verification too)
      #   still In Progress -> upload anyway; the app becomes
      #                        Gatekeeper-clean retroactively on acceptance
      #   Invalid           -> the only real failure; print Apple's log
      - name: Notarize (staple when Apple answers in time)
        if: env.MACOS_CERT_P12 != ''
        run: |
          notary() { xcrun notarytool "$@" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD"; }
          ditto -c -k --keepParent "dist/Kovyr Vault.app" notarize-app.zip
          notary submit notarize-app.zip --wait --timeout 20m --output-format json > app-result.json || true
          cat app-result.json
          APP_STATUS=$(python3 -c "import json;print(json.load(open('app-result.json')).get('status',''))" 2>/dev/null || echo "")
          APP_SUB_ID=$(python3 -c "import json;print(json.load(open('app-result.json')).get('id',''))" 2>/dev/null || echo "")
          if [ "$APP_STATUS" = "Accepted" ]; then
            xcrun stapler staple "dist/Kovyr Vault.app"
            echo "App notarized and stapled."
          elif [ "$APP_STATUS" = "Invalid" ]; then
            echo "::error::Apple rejected the app (submission '$APP_SUB_ID') — log follows"
            [ -n "$APP_SUB_ID" ] && notary log "$APP_SUB_ID" || true
            exit 1
          else
            echo "::warning::Notarization still pending (submission '$APP_SUB_ID') — uploading the signed app anyway. Apple's ticket attaches server-side on acceptance and Gatekeeper verifies online, so the app opens cleanly once accepted (no rebuild needed)."
          fi
          # CLI binary: fire-and-forget submission; ticket attaches when done.
          ditto -c -k --keepParent dist/kovyr-vault notarize-cli.zip
          notary submit notarize-cli.zip --output-format json > cli-result.json || true
          cat cli-result.json

      # DMG installer: open, drag the app to Applications — the standard
      # Mac install ritual, no Terminal involved. Signed when possible;
      # the app inside carries its own notarization either way.
      - name: Build DMG installer
        run: |
          mkdir dmg-staging
          cp -R "dist/Kovyr Vault.app" dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "Kovyr Vault" -srcfolder dmg-staging -ov -format UDZO "dist/KovyrVault.dmg"
          if [ -n "${SIGN_IDENTITY:-}" ]; then
            codesign --force --sign "$SIGN_IDENTITY" "dist/KovyrVault.dmg"
            notary() { xcrun notarytool "$@" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --password "$APPLE_APP_PASSWORD"; }
            notary submit "dist/KovyrVault.dmg" --output-format json || true
          fi

      # Zip the .app ourselves to preserve the executable bits that a raw
      # artifact upload would strip from the bundle.
      - name: Package artifacts
        run: |
          cd dist
          zip -qry kovyr-vault-macos.zip kovyr-vault "Kovyr Vault.app"

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: kovyr-vault-macos
          if-no-files-found: error
          path: |
            kovyr-vault/dist/kovyr-vault-macos.zip
            kovyr-vault/dist/KovyrVault.dmg
